version: '3.8'

services:
  # PostgreSQL Database
  # Requires a .env file with DB_USER and DB_PASSWORD. See .env.example for reference.
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: regulatoriq
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - regulatoriq-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d regulatoriq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - regulatoriq-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - regulatoriq-network

  # Apache Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - regulatoriq-network

  kafka:
    image: confluentinc/cp-kafka:latest
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - regulatoriq-network

  # API Application
  api:
    build:
      context: .
      dockerfile: src/RegulatorIQ.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=regulatoriq;Username=${DB_USER};Password=${DB_PASSWORD}
      - Redis__Configuration=redis:6379
      - Elasticsearch__Uri=http://elasticsearch:9200
      - Kafka__BootstrapServers=kafka:9092
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - MLServices__BaseUrl=http://ml-services:8000
      - Cors__AllowedOrigins=http://localhost:3000,https://regulatoriq.com
      - Logging__LogLevel__Default=Information
    ports:
      - "5000:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - regulatoriq-network

  # Python ML Services
  ml-services:
    build:
      context: .
      dockerfile: src/RegulatorIQ.MLServices/Dockerfile
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/regulatoriq
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HUGGINGFACE_API_TOKEN=${HUGGINGFACE_API_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - regulatoriq-network

  # Selenium Hub for browser automation
  selenium-hub:
    image: selenium/hub:4.15.0
    ports:
      - "4444:4444"
    networks:
      - regulatoriq-network

  selenium-chrome:
    image: selenium/node-chrome:4.15.0
    environment:
      HUB_HOST: selenium-hub
      HUB_PORT: 4444
    depends_on:
      - selenium-hub
    networks:
      - regulatoriq-network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_ENVIRONMENT=production
    depends_on:
      - api
    networks:
      - regulatoriq-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
      - frontend
    networks:
      - regulatoriq-network

  # Background Job Processing (Hangfire)
  hangfire:
    build:
      context: .
      dockerfile: src/RegulatorIQ.BackgroundServices/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=regulatoriq;Username=${DB_USER};Password=${DB_PASSWORD}
      - Redis__Configuration=redis:6379
      - MLServices__BaseUrl=http://ml-services:8000
      - Hangfire__WorkerCount=5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - regulatoriq-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  regulatoriq-network:
    driver: bridge
